<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIKE 544 - Login</title>
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="login">
    <div class="area-login">
        <div class="area-login-foto">
            <img src="../IMG/bmx-racing.avif" alt="Foto da tela de login">
        </div>

        <div class="area-login-form">
            <form action="">
                <p class="title-login">LOGIN</p>
                <div class="area-inputs-login">
                    <label for="usuario" class="label-login">Usuário</label>
                    <input type="email" name="Usuario" id="usuario" placeholder="Digite seu usuário" class="input-login">
                </div>
                <div class="area-inputs-login">
                    <label for="senha" class="label-login">Senha</label>
                    <input type="password" name="senha" id="senha" placeholder="Digite sua senha" class="input-login">
                </div>
                <div class="area-itens-login">
                    <div class="area-conectado">
                        <input type="checkbox" name="conectado" id="conectado">
                        <label for="conectado" class="label-conectado">Manter Conectado</label>
                    </div>
                    <p class="esqueci-senha">Esqueci minha <a href="">senha</a></p>
                </div>
                <button type="submit" class="btn-login">LOGAR</button>
                <div class="area-itens-login">
                    <p">Não tem uma conta? <a href="Cadastro.html">Cadastre-se</a></p>
                </div>
                <div class="area-logar-icons">
                    <p class="logar-com">Logar com</p>
                    <div class="area-icons-login">
                        <a href="" id="icon-login-facebook"><i class="fab fa-facebook"></i></a>
                        <a href="" id="icon-login-google"><i class="fab fa-google"></i></a>
                        <a href="" id="icon-login-apple"><i class="fab fa-apple"></i></a>
                    </div>
                </div>
            </form>
        </div>
    </div>

</body>

</html>
